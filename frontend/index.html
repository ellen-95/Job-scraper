<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job-scraper</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        color-scheme: light;
        --background: #f6f7f9;
        --surface: #ffffff;
        --border: #d8dde6;
        --text: #20242a;
        --muted: #667085;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--background);
        color: var(--text);
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.1rem;
      }

      .muted {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .summary {
        min-width: 150px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        text-align: right;
      }

      .summary strong {
        display: block;
        font-size: 1.8rem;
      }

      .panel {
        margin-bottom: 20px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        min-height: 40px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
      }

      button {
        min-height: 40px;
        padding: 9px 14px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      #status {
        min-height: 22px;
        margin: 0 0 16px;
        color: var(--muted);
      }

      #status.error {
        color: var(--danger);
      }

      .chart-wrap {
        height: 280px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 700;
      }

      td {
        font-size: 0.92rem;
      }

      a {
        color: var(--accent);
      }

      .empty {
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 820px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .summary {
          text-align: left;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Job-scraper</h1>
          <p class="muted">RemoteOK jobs stored in MySQL</p>
        </div>
        <div class="summary">
          <span class="muted">Total jobs</span>
          <strong id="totalJobs">0</strong>
        </div>
      </header>

      <section class="panel">
        <div class="controls">
          <button id="scrapeButton" type="button">Trigger Scrape</button>
          <label>
            Keyword
            <input id="keywordInput" type="search" placeholder="title or tag">
          </label>
          <label>
            Company
            <input id="companyInput" type="search" placeholder="company name">
          </label>
          <button id="filterButton" type="button">Apply Filters</button>
        </div>
      </section>

      <p id="status">Loading dashboard...</p>

      <section class="panel">
        <h2>Top Tags</h2>
        <div class="chart-wrap">
          <canvas id="tagsChart"></canvas>
        </div>
      </section>

      <section class="panel">
        <h2>Jobs</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Company</th>
                <th>Tags</th>
                <th>Location</th>
                <th>Date Posted</th>
                <th>URL</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty" hidden>No jobs found.</div>
      </section>
    </main>

    <script>
      const totalJobs = document.querySelector("#totalJobs");
      const statusText = document.querySelector("#status");
      const scrapeButton = document.querySelector("#scrapeButton");
      const filterButton = document.querySelector("#filterButton");
      const keywordInput = document.querySelector("#keywordInput");
      const companyInput = document.querySelector("#companyInput");
      const jobsTableBody = document.querySelector("#jobsTableBody");
      const emptyState = document.querySelector("#emptyState");
      const chartCanvas = document.querySelector("#tagsChart");

      let tagsChart;

      scrapeButton.addEventListener("click", async () => {
        setLoading(true, "Scraping jobs...");

        try {
          const result = await requestJson("/scrape", { method: "POST" });
          setStatus(`Fetched ${result.fetched} jobs. Inserted ${result.inserted} new jobs.`);
          await loadDashboard();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      });

      filterButton.addEventListener("click", async () => {
        setLoading(true, "Applying filters...");

        try {
          await loadJobs();
          setStatus("Filters applied.");
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      });

      async function loadDashboard() {
        await Promise.all([loadStats(), loadJobs()]);
      }

      async function loadStats() {
        const stats = await requestJson("/stats");
        totalJobs.textContent = stats.total_jobs ?? 0;
        renderTagsChart(stats.top_5_tags || []);
      }

      async function loadJobs() {
        const params = new URLSearchParams();
        const keyword = keywordInput.value.trim();
        const company = companyInput.value.trim();

        if (keyword) {
          params.set("keyword", keyword);
        }

        if (company) {
          params.set("company", company);
        }

        const url = params.toString() ? `/jobs?${params}` : "/jobs";
        const jobs = await requestJson(url);
        renderJobs(jobs);
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, options);

        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }

        return response.json();
      }

      function renderJobs(jobs) {
        jobsTableBody.innerHTML = "";
        emptyState.hidden = jobs.length > 0;

        for (const job of jobs) {
          const row = document.createElement("tr");

          appendCell(row, job.title || "");
          appendCell(row, job.company || "");
          appendCell(row, (job.tags || []).join(", "));
          appendCell(row, job.location || "");
          appendCell(row, formatDate(job.date_posted));
          appendLinkCell(row, job.url || "");

          jobsTableBody.appendChild(row);
        }
      }

      function appendCell(row, text) {
        const cell = document.createElement("td");
        cell.textContent = text;
        row.appendChild(cell);
      }

      function appendLinkCell(row, url) {
        const cell = document.createElement("td");

        if (url) {
          const link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "Open";
          cell.appendChild(link);
        }

        row.appendChild(cell);
      }

      function formatDate(value) {
        if (!value) {
          return "";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "";
        }

        return date.toISOString().slice(0, 10);
      }

      function renderTagsChart(tags) {
        const labels = tags.map((item) => item.tag);
        const values = tags.map((item) => item.count);

        if (tagsChart) {
          tagsChart.destroy();
        }

        tagsChart = new Chart(chartCanvas, {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                label: "Jobs",
                data: values,
                backgroundColor: "#2563eb"
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  precision: 0
                }
              }
            }
          }
        });
      }

      function setLoading(isLoading, message = "") {
        scrapeButton.disabled = isLoading;
        filterButton.disabled = isLoading;

        if (message) {
          setStatus(message);
        }
      }

      function setStatus(message) {
        statusText.classList.remove("error");
        statusText.textContent = message;
      }

      function setError(message) {
        statusText.classList.add("error");
        statusText.textContent = message;
      }

      loadDashboard()
        .then(() => setStatus("Dashboard loaded."))
        .catch((error) => setError(error.message));
    </script>
  </body>
</html>
